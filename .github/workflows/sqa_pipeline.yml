name: SQA Backend Pipeline

on: [push]

jobs:
  run-logic-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Execute Automated SQA Tests
      run: python -m unittest test_service.py